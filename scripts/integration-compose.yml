# Integration test compose - AIO Dispatcharr with plugin volume
services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: vodfs_integration
    restart: unless-stopped
    ports:
      - "9191:9191"
      - "8888:8888"
    volumes:
      - vodfs_integration_data:/data
      - /home/onehottake/Projects/Plugins/plugins/vodfs:/data/plugins/vodfs
    environment:
      - DISPATCHARR_ENV=aio
      - DISPATCHARR_DEBUG=true
      - DISPATCHARR_LOG_LEVEL=debug
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
    # Install plugin dependencies (uvicorn, fastapi) before starting
    command: >
      bash -c "
        /dispatcharrpy/bin/python -m ensurepip --upgrade 2>/dev/null &&
        /dispatcharrpy/bin/python -m pip install -q uvicorn fastapi jinja2 2>/dev/null &&
        exec /entrypoint.sh
      "

volumes:
  vodfs_integration_data: